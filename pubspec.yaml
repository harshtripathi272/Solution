name: sevasetu
description: "SevaSetu - AI-Powered Volunteer Coordination with Predictive Crisis Response"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.2.1
  http: ^1.1.2
  geolocator: ^14.0.2
  web: ^1.1.1
  flutter_map: ^6.1.0
  flutter_map_heatmap: ^0.0.5
  latlong2: ^0.9.0
  multi_select_flutter: ^4.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
